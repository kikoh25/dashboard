# =============================================================================
# Apache2 VirtualHost – IT Control Enterprise Dashboard
# AWS EC2 t3.medium  |  coexists with GLPI and n8n
#
# Install:
#   sudo cp it-dashboard.conf /etc/apache2/sites-available/
#   sudo a2ensite it-dashboard
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite
#   sudo systemctl reload apache2
#
# Assumes the dashboard runs on http://127.0.0.1:3000 (PM2 managed)
# =============================================================================

<VirtualHost *:80>
    ServerName dashboard.seudominio.com.br
    # ServerAlias www.dashboard.seudominio.com.br

    # -------------------------------------------------------------------
    # Redirect all HTTP to HTTPS
    # (remove this block if SSL is terminated elsewhere, e.g. AWS ALB)
    # -------------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName dashboard.seudominio.com.br
    # ServerAlias www.dashboard.seudominio.com.br

    # -------------------------------------------------------------------
    # SSL – replace with your certificate paths (or use Certbot)
    # -------------------------------------------------------------------
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/dashboard.seudominio.com.br/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/dashboard.seudominio.com.br/privkey.pem
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # -------------------------------------------------------------------
    # Proxy to Next.js (PM2 on port 3000)
    # -------------------------------------------------------------------
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket support (Next.js HMR / future features)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    # -------------------------------------------------------------------
    # Security & performance headers
    # -------------------------------------------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Cache static Next.js assets aggressively (they are content-hashed)
    <LocationMatch "^\/_next\/static\/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Cache public static files
    <LocationMatch "^\/(?!_next).*\.(ico|png|jpg|jpeg|svg|webp|woff2|woff|ttf)$">
        Header set Cache-Control "public, max-age=86400"
    </LocationMatch>

    # -------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------
    ErrorLog  /var/log/apache2/it-dashboard-error.log
    CustomLog /var/log/apache2/it-dashboard-access.log combined
    LogLevel warn
</VirtualHost>
